# --------------- 必改项：仅修改这里的路径 ---------------
# 数据集根目录（你存放训练/验证集的总文件夹，填绝对路径最稳）
path: D:/Code/1.YOLO/X-AnyLabeling/datasets  # 改成你自己的数据集根路径

# 训练集图片路径（相对于path，或直接写绝对路径）
train: train/images  # 根目录下的训练图文件夹
# 验证集图片路径（核心！验证集测试只看这个）
val: valid/images      # 根目录下的验证图文件夹
# 测试集（可选，不用可删除）
test:

# --------------- 固定项：你的单类别，不用改 ---------------
# 类别数量（number of classes）：你只有1类，必须写1
nc: 1
# 类别名称：必须和训练时、X-AnyLabeling配置里的 classes 完全一致！
names:
  0: zhenjiao